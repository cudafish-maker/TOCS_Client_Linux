<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TOCS Map</title>
<link rel="stylesheet" href="leaflet.css"/>
<script src="leaflet.js"></script>
<script src="idb.min.js"></script>
<script src="leaflet.offline.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body, #map { width: 100%; height: 100%; background: #1e1e2e; }

  /* Custom marker styles */
  .tocs-marker {
    width: 28px;
    height: 28px;
    border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg);
    border: 2px solid rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .tocs-marker-inner {
    transform: rotate(45deg);
    font-size: 13px;
    line-height: 1;
  }
  .tocs-marker.status-compromised {
    border-color: #f38ba8 !important;
    border-width: 3px;
    box-shadow: 0 0 6px #f38ba8;
  }
  .tocs-marker.status-unknown {
    opacity: 0.65;
  }
  .tocs-marker.status-inactive {
    opacity: 0.45;
  }
  .tocs-marker.unverified {
    border: 2px dashed #f9e2af;
    opacity: 0.65;
  }
  .tocs-marker-badge {
    position: absolute;
    top: -5px;
    right: -5px;
    transform: rotate(45deg);
    width: 13px;
    height: 13px;
    border-radius: 50%;
    background: #f9e2af;
    color: #11111b;
    font-size: 9px;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* SITREP marker */
  .sitrep-marker {
    width: 20px;
    height: 20px;
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: bold;
    border: 1px solid rgba(0,0,0,0.5);
    color: #11111b;
  }

  /* Place mode cursor */
  body.place-mode { cursor: crosshair; }

  /* Leaflet dark overrides */
  .leaflet-container { background: #313244; }
  .leaflet-tile-pane { filter: brightness(1.0); }
  .leaflet-popup-content-wrapper {
    background: #1e1e2e;
    color: #cdd6f4;
    border: 1px solid #313244;
    border-radius: 6px;
    font-family: monospace;
    font-size: 12px;
  }
  .leaflet-popup-tip { background: #1e1e2e; }
  .leaflet-popup-close-button { color: #cdd6f4 !important; }
  .leaflet-control-zoom a {
    background: #1e1e2e !important;
    color: #cdd6f4 !important;
    border-color: #313244 !important;
  }
  .leaflet-control-zoom a:hover { background: #313244 !important; }
  .leaflet-control-attribution {
    background: rgba(17,17,27,0.7) !important;
    color: #585b70 !important;
    font-size: 9px !important;
  }
  .leaflet-control-attribution a { color: #89b4fa !important; }

  /* ── Offline cache controls ──────────────────────────────────────── */
  .savetiles.leaflet-bar a {
    background: #1e1e2e !important;
    color: #cdd6f4 !important;
    border-color: #313244 !important;
    font-size: 15px !important;
    line-height: 26px !important;
    width: 26px !important;
    height: 26px !important;
    display: flex !important;
    align-items: center;
    justify-content: center;
  }
  .savetiles.leaflet-bar a:hover { background: #313244 !important; }
  .savetiles.leaflet-bar a.rmtiles { color: #f38ba8 !important; }

  .cache-status-ctrl {
    background: rgba(17,17,27,0.85);
    color: #585b70;
    font-family: monospace;
    font-size: 10px;
    padding: 3px 7px;
    border-radius: 3px;
    border: 1px solid #313244;
    white-space: nowrap;
    pointer-events: none;
  }
  .cache-status-ctrl.has-tiles { color: #a6adc8; }
  .cache-status-ctrl.saving    { color: #a6e3a1; }
</style>
</head>
<body>
<div id="map"></div>

<script>
// ── Wait for QWebChannel, then boot ──────────────────────────────────────────
var bridge = null;
var map    = null;
var markers     = {};   // asset id  → L.Marker
var markerTypes = {};   // asset id  → asset_type string
var sitreps     = {};   // sitrep id → L.Marker
var placeMode   = null; // null | 'asset' | 'sitrep'

function initMap() {
  map = L.map('map', {
    center: [39.5, -98.35],
    zoom:   5,
    zoomControl: true,
  });

  // ── Tile layers (offline-capable: serve from cache, fall back to network) ──
  var baseLayers = {
    "Street": L.tileLayer.offline('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
      attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors © <a href="https://carto.com/attributions">CARTO</a>',
      subdomains: 'abcd', maxZoom: 20,
    }),
    "Topographic": L.tileLayer.offline('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
      attribution: '© <a href="https://opentopomap.org">OpenTopoMap</a> (CC-BY-SA)',
      maxZoom: 17,
    }),
    "Satellite": L.tileLayer.offline('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
      attribution: 'Tiles © Esri — Source: Esri, USGS, NOAA',
      maxZoom: 19,
    }),
    "Dark": L.tileLayer.offline('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors © <a href="https://carto.com/attributions">CARTO</a>',
      subdomains: 'abcd', maxZoom: 20,
    }),
  };

  var overlays = {
    "Labels": L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', {
      attribution: 'Tiles © Esri',
      maxZoom: 19,
      opacity: 0.9,
    }),
  };

  baseLayers["Street"].addTo(map);
  L.control.layers(baseLayers, overlays, { position: 'topright', collapsed: true }).addTo(map);

  map.on('click', function(e) {
    if (placeMode && bridge) {
      bridge.mapClicked(e.latlng.lat, e.latlng.lng);
      exitPlaceMode();
    }
  });

  map.on('mousemove', function(e) {
    if (bridge) {
      bridge.mouseMove(e.latlng.lat, e.latlng.lng);
    }
  });

  // ── Offline tile cache ────────────────────────────────────────────────────
  var _activeBaseLayer = baseLayers["Street"];

  // Save tiles control — 💾 saves current view z5→z16, 🗑 clears all
  var _saveTiles = L.control.savetiles(_activeBaseLayer, {
    position:       'bottomleft',
    saveText:       '💾',
    rmText:         '🗑',
    saveWhatYouSee: true,
    maxZoom:        16,
    parallel:       10,
    alwaysDownload: false,   // skip tiles already in cache
    confirm: function(status, go) {
      var n = status.lengthToBeSaved;
      if (n === 0) {
        alert('No tiles to cache — zoom in or pan to your area of operations first.');
        return;
      }
      var mb = Math.round(n * 15 / 1024);
      if (window.confirm('Cache ' + n + ' map tiles for offline use?\n(approx. ' + mb + ' MB)')) go();
    },
    confirmRemoval: function(status, go) {
      if (window.confirm('Delete all ' + status.storagesize + ' cached tiles?')) go();
    },
  });
  _saveTiles.addTo(map);

  // Track active base layer so savetiles control saves the right one
  map.on('baselayerchange', function(e) {
    _activeBaseLayer = e.layer;
    _saveTiles.setLayer(e.layer);
    // Reset cached size display for new layer context
    _saveTiles.status.storagesize = null;
    _saveTiles.setStorageSize();
  });

  // ── Cache status indicator ────────────────────────────────────────────────
  var _StatusControl = L.Control.extend({
    options: { position: 'bottomleft' },
    onAdd: function() {
      this._el = L.DomUtil.create('div', 'cache-status-ctrl');
      this._el.textContent = '';
      return this._el;
    },
    set: function(text, cls) {
      this._el.className = 'cache-status-ctrl' + (cls ? ' ' + cls : '');
      this._el.textContent = text;
    }
  });
  var _statusCtrl = new _StatusControl();
  _statusCtrl.addTo(map);

  function refreshCacheCount() {
    if (window.LeafletOffline) {
      LeafletOffline.getStorageLength().then(function(n) {
        if (n > 0) {
          _statusCtrl.set('📦 ' + n.toLocaleString() + ' tiles cached', 'has-tiles');
        } else {
          _statusCtrl.set('No tiles cached');
        }
      }).catch(function() {
        _statusCtrl.set('');
      });
    }
  }
  refreshCacheCount();

  // Wire progress events across all offline base layers
  Object.values(baseLayers).forEach(function(layer) {
    layer.on('savestart', function(e) {
      _statusCtrl.set('Caching 0\u202f/\u202f' + e.lengthToBeSaved + '\u2026', 'saving');
    });
    layer.on('savetileend', function(e) {
      _statusCtrl.set('Caching ' + e.lengthSaved + '\u202f/\u202f' + e.lengthToBeSaved + '\u2026', 'saving');
    });
    layer.on('saveend', function() {
      refreshCacheCount();
    });
    layer.on('tilesremoved', function() {
      _statusCtrl.set('No tiles cached');
    });
  });
}

// ── Marker icon factory ───────────────────────────────────────────────────────
var TYPE_ICONS = {
  operator:  { color: '#89b4fa', symbol: '👤' },
  safehouse: { color: '#a6e3a1', symbol: '🏠' },
  cache:     { color: '#fab387', symbol: '📦' },
  txsite:    { color: '#cba6f7', symbol: '📡' },
};

function makeAssetIcon(assetType, status, colorOverride, verified) {
  var cfg = TYPE_ICONS[assetType] || { color: '#cdd6f4', symbol: '◆' };
  var color = colorOverride || cfg.color;
  var symbol = cfg.symbol || '◆';
  var statusClass = 'status-' + (status || 'unknown').toLowerCase();
  var unverifiedClass = (verified === false) ? ' unverified' : '';
  var badge = (verified === false) ? '<div class="tocs-marker-badge">?</div>' : '';
  var html = '<div class="tocs-marker ' + statusClass + unverifiedClass + '" style="background:' + color + '; position:relative;">' +
             '<div class="tocs-marker-inner">' + symbol + '</div>' + badge + '</div>';
  return L.divIcon({ html: html, className: '', iconSize: [28, 28], iconAnchor: [14, 28], popupAnchor: [0, -30] });
}

var SEVERITY_COLORS = {
  'Routine':   '#89b4fa',
  'Priority':  '#f9e2af',
  'Flash':     '#fab387',
  'Immediate': '#f38ba8',
};

function makeSitrepIcon(severity) {
  var color = SEVERITY_COLORS[severity] || '#89b4fa';
  var label = severity ? severity[0] : 'R';
  var html = '<div class="sitrep-marker" style="background:' + color + ';">' + label + '</div>';
  return L.divIcon({ html: html, className: '', iconSize: [20, 20], iconAnchor: [10, 10], popupAnchor: [0, -14] });
}

// ── Asset marker management (called from Python via runJavaScript) ────────────
function addOrUpdateAsset(data) {
  // data: {id, name, asset_type, lat, lon, status, status_note, callsign?, ...}
  var icon = makeAssetIcon(data.asset_type, data.status, data.color, data.verified);
  var popupHtml = buildAssetPopup(data);

  markerTypes[data.id] = data.asset_type;
  if (markers[data.id]) {
    markers[data.id].setLatLng([data.lat, data.lon]);
    markers[data.id].setIcon(icon);
    markers[data.id].setPopupContent(popupHtml);
  } else {
    var m = L.marker([data.lat, data.lon], { icon: icon })
      .bindPopup(popupHtml)
      .addTo(map);
    m.on('click', function() {
      if (bridge) bridge.assetClicked(data.id);
    });
    markers[data.id] = m;
  }
}

function removeAsset(id) {
  if (markers[id]) {
    map.removeLayer(markers[id]);
    delete markers[id];
    delete markerTypes[id];
  }
}

function setTypeVisible(type_key, visible) {
  for (var id in markers) {
    if (markerTypes[id] === type_key) {
      if (visible) {
        if (!map.hasLayer(markers[id])) markers[id].addTo(map);
      } else {
        if (map.hasLayer(markers[id])) map.removeLayer(markers[id]);
      }
    }
  }
}

function addOrUpdateSitrep(data) {
  // data: {id, title, severity, lat, lon}
  var icon = makeSitrepIcon(data.severity);
  var popupHtml = '<b>[' + data.severity + ']</b> ' + escHtml(data.title);

  if (sitreps[data.id]) {
    sitreps[data.id].setLatLng([data.lat, data.lon]);
    sitreps[data.id].setIcon(icon);
    sitreps[data.id].setPopupContent(popupHtml);
  } else {
    var m = L.marker([data.lat, data.lon], { icon: icon })
      .bindPopup(popupHtml)
      .addTo(map);
    m.on('click', function() {
      if (bridge) bridge.sitrepClicked(data.id);
    });
    sitreps[data.id] = m;
  }
}

function removeSitrep(id) {
  if (sitreps[id]) {
    map.removeLayer(sitreps[id]);
    delete sitreps[id];
  }
}

function panTo(lat, lon, zoom) {
  if (zoom !== undefined) {
    map.setView([lat, lon], zoom);
  } else {
    map.panTo([lat, lon]);
  }
}

// ── Place mode (click-to-place) ───────────────────────────────────────────────
function enterPlaceMode(mode) {
  placeMode = mode;
  document.body.classList.add('place-mode');
}

function exitPlaceMode() {
  placeMode = null;
  document.body.classList.remove('place-mode');
}

// ── Popup builder ─────────────────────────────────────────────────────────────
function buildAssetPopup(d) {
  var lines = ['<b>' + escHtml(d.name) + '</b>'];
  if (d.verified === false) lines.push('<span style="color:#f9e2af;">⚠ UNVERIFIED</span>');
  lines.push('<span style="color:#a6adc8;">' + escHtml(d.asset_type) + ' · ' + escHtml(d.status) + '</span>');
  if (d.callsign) lines.push('Callsign: ' + escHtml(d.callsign));
  if (d.codename) lines.push('Codename: ' + escHtml(d.codename));
  if (d.frequency) lines.push('Freq: ' + d.frequency + ' MHz');
  if (d.status_note) lines.push('<i>' + escHtml(d.status_note) + '</i>');
  lines.push('<span style="color:#585b70;font-size:10px;">' + d.lat.toFixed(5) + ', ' + d.lon.toFixed(5) + '</span>');
  return lines.join('<br/>');
}

function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── QWebChannel bootstrap ─────────────────────────────────────────────────────
function connectBridge() {
  if (typeof qt === 'undefined' || !qt.webChannelTransport) {
    setTimeout(connectBridge, 50);
    return;
  }
  new QWebChannel(qt.webChannelTransport, function(channel) {
    bridge = channel.objects.tocs;
    initMap();
    if (bridge.mapReady) bridge.mapReady();
  });
}

// qwebchannel.js is injected by Python before this page loads
connectBridge();
</script>
</body>
</html>
